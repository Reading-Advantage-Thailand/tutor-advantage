name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test-and-build:
    name: Lint, test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Run lint
        run: npm run lint

      - name: Run unit tests with coverage thresholds
        run: npm run test:coverage

      - name: Run service builds
        run: npm run build:services

      - name: Build shared config
        run: npm run build -w @tutor-advantage/shared-config

      - name: Build frontend applications
        run: npm run build

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tutor_advantage_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tutor_advantage_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test database schema
        run: npx prisma db push --schema=packages/database/prisma/schema.prisma

      - name: Run integration tests
        run: npm run test:integration

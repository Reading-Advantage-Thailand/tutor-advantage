openapi: 3.1.0
info:
  title: Tutor Advantage Identity Service API
  version: "1.0.0"
  description: API for managing user identity, authentication, and guardian consent.
servers:
  - url: http://localhost:3001
    description: Local development server
paths:
  /health:
    get:
      summary: Health Check
      responses:
        "200":
          description: OK
  /version:
    get:
      summary: Get Service Version
      responses:
        "200":
          description: Version metadata
  /v1/auth/callback:
    post:
      summary: OAuth Callback
      description: Handles OAuth callback from Facebook, Google, or LINE.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [provider, code]
              properties:
                provider:
                  type: string
                  enum: [facebook, google, line]
                code:
                  type: string
                  minLength: 1
                sponsorTutorId:
                  type: string
                codeVerifier:
                  type: string
                defaultRole:
                  type: string
                phoneNumber:
                  type: string
                redirectUri:
                  type: string
                  format: uri
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                required: [sessionToken, roleUpgraded, user]
                properties:
                  sessionToken:
                    type: string
                  roleUpgraded:
                    type: boolean
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequestError"
  /v1/session:
    get:
      summary: Get Current Session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /v1/users/me/profile:
    patch:
      summary: Update Current User Profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [dateOfBirth]
              properties:
                dateOfBirth:
                  type: string
                  format: date
      responses:
        "200":
          description: Profile and guardian requirement updated
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /v1/users/me/settings:
    get:
      summary: Get current user settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current settings and linked LINE status
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [settings, lineConnected]
                properties:
                  settings:
                    $ref: "#/components/schemas/UserSettings"
                  lineConnected:
                    type: boolean
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    patch:
      summary: Update current user settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [settings]
                properties:
                  settings:
                    $ref: "#/components/schemas/UserSettings"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /v1/guardian/consent:
    post:
      summary: Submit Guardian Consent
      description: Required flow for underage students before payment or contact.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [guardianName, guardianContact, consentGiven]
              properties:
                guardianName:
                  type: string
                guardianContact:
                  type: string
                consentGiven:
                  type: boolean
      responses:
        "200":
          description: Consent recorded
        "401":
          $ref: "#/components/responses/UnauthorizedError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    NotificationSettings:
      type: object
      additionalProperties: false
      properties:
        notifyClassReminders:
          type: boolean
        notifyScoreUpdates:
          type: boolean
        notifyLineMessages:
          type: boolean
        notifyMarketing:
          type: boolean
    UserSettings:
      type: object
      additionalProperties: true
      properties:
        notifications:
          $ref: "#/components/schemas/NotificationSettings"
    User:
      type: object
      additionalProperties: false
      required: [id, name, role, dateOfBirth, requiresGuardian]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [STUDENT, TUTOR, ADMIN, FINANCE_MAKER, FINANCE_CHECKER]
        dateOfBirth:
          type: [string, "null"]
          format: date
        requiresGuardian:
          type: boolean
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
            details:
              type: object
  responses:
    BadRequestError:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
